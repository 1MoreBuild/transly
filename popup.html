<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transly</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="app-header">
        <div class="brand">
          <h1>Transly</h1>
        </div>
        <div id="connectionBadge" class="connection-badge" data-state="checking">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="connectionLabel">Checking</span>
        </div>
      </header>

      <section class="language-section" aria-labelledby="languageHeading">
        <h2 id="languageHeading">Language</h2>
        <div class="language-flow">
          <div class="language-control" aria-label="Source language: Auto detect">
            <span class="control-label">From</span>
            <strong>Auto detect</strong>
          </div>
          <span class="flow-arrow" aria-hidden="true">→</span>
          <label class="language-control" for="targetLanguage">
            <span class="control-label">To</span>
            <select id="targetLanguage" aria-label="Target language">
              <option value="zh-CN">简体中文</option>
              <option value="zh-TW">繁體中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="es">Español</option>
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="pt-BR">Português</option>
            </select>
          </label>
        </div>
      </section>

      <section class="engine-row" aria-label="Translation engine">
        <div>
          <span class="section-kicker">Translation engine</span>
          <strong>Codex subscription</strong>
        </div>
        <span id="modelValue" class="model-value">Connecting…</span>
      </section>

      <section class="primary-action-section">
        <div class="primary-action-row">
          <button
            id="articleDisplayMode"
            class="display-mode-action"
            type="button"
            data-mode="bilingual"
            data-tooltip="Bilingual view. Switch to translation only."
            aria-label="Bilingual view. Switch to translation only."
          >
            <span class="display-mode-icon" aria-hidden="true">
              <span class="display-mode-source">文</span>
              <span class="display-mode-target">A</span>
            </span>
          </button>
          <button id="translateArticle" class="primary-action" type="button">
            <span>Translate this article</span>
          </button>
        </div>
      </section>

      <section class="feature-list" aria-label="Translation controls">
        <div class="feature-row">
          <div class="feature-copy">
            <strong>Article translation</strong>
            <span id="articleState">Not translated</span>
          </div>
          <button id="clearArticle" class="text-action" type="button" disabled>Clear</button>
        </div>

        <label class="feature-row" for="subtitleToggle">
          <div class="feature-copy">
            <strong>Video subtitles</strong>
            <span id="subtitleState">Off</span>
          </div>
          <span class="switch">
            <input id="subtitleToggle" type="checkbox" role="switch">
            <span class="switch-track" aria-hidden="true"></span>
          </span>
        </label>
      </section>

      <footer class="status-footer">
        <p id="status" role="status" aria-live="polite">Ready</p>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
